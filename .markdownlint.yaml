# markdownlint configuration
# https://github.com/DavidAnson/markdownlint

default: true

# Allow long lines in prose / tables (RFC has wide tables).
MD013: false

# Allow inline HTML (we use small SVG/diagram tags occasionally).
MD033: false

# Allow duplicate headings under different parents.
MD024:
  siblings_only: true

# First heading is required, but the doc title may be a different style.
MD041: false

# Allow nested fenced code blocks (we have YAML inside Markdown sections).
MD046:
  style: fenced

# Bare URLs are fine in markdown for internal links.
MD034: false

# Heading punctuation — RFC sections end with periods sometimes.
MD026:
  punctuation: ".,;:!?"

# Allow ordered list non-1 numbering for grouped sequences.
# Phase plans deliberately number deliverables continuously across
# subsections (1-4 under heading A, 5-8 under heading B, etc.) so the
# "deliverable #N" references in acceptance criteria stay stable. The
# stricter "ordered" style requires per-list resets, which would defeat
# that. Disable entirely.
MD029: false

# Headings inside deeply-nested step lists occasionally land flush
# against the preceding paragraph. Code-blocks-as-list-content already
# make spacing irregular; relaxing the strict before/after blanks rule
# keeps plan docs readable.
MD022: false

# Blank lines inside blockquotes are a stylistic choice in our long
# RFC-style preambles; the quote-then-detail-then-quote shape conveys
# meaning the strict rule would force us to break apart.
MD028: false

# Markdownlint's table-column-count rule miscounts columns when a cell
# carries an inline code block with `|` pipes — appears in our V2
# phase plans where we render comparison matrices. Disable.
MD056: false

# Table-column-style (added in markdownlint v0.40.0) demands that pipe
# alignment match a single style across the document. Our phase plans mix
# compact and aligned tables intentionally (compact for short matrices,
# aligned for wide multi-column comparison). Disable.
MD060: false

# Fenced code blocks need not declare a language — RFC and plan docs include
# many freeform / shell-output snippets where forcing a tag is noise.
MD040: false

# Allow fenced code blocks without surrounding blank lines (lots of nested
# code blocks inside numbered lists).
MD031: false

# Allow lists without surrounding blank lines (matches our doc style for
# tightly-packed enumerations).
MD032: false

# Allow inline code without surrounding blanks; the heuristic flags too many
# legitimate prose-with-symbols lines.
MD038: false

# Allow trailing punctuation in headings — we use ":" and "." in some.
MD036: false

# Both `*emphasis*` and `_emphasis_` are fine; markdown engines render them
# identically and our docs use both.
MD049: false

# Hard tabs appear inside fenced code blocks (Go source) — that's expected.
MD010:
  code_blocks: false
