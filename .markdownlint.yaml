# markdownlint configuration
# https://github.com/DavidAnson/markdownlint

default: true

# Allow long lines in prose / tables (RFC has wide tables).
MD013: false

# Allow inline HTML (we use small SVG/diagram tags occasionally).
MD033: false

# Allow duplicate headings under different parents.
MD024:
  siblings_only: true

# First heading is required, but the doc title may be a different style.
MD041: false

# Allow nested fenced code blocks (we have YAML inside Markdown sections).
MD046:
  style: fenced

# Bare URLs are fine in markdown for internal links.
MD034: false

# Heading punctuation — RFC sections end with periods sometimes.
MD026:
  punctuation: ".,;:!?"

# Allow ordered list non-1 numbering for grouped sequences.
MD029:
  style: ordered

# Fenced code blocks need not declare a language — RFC and plan docs include
# many freeform / shell-output snippets where forcing a tag is noise.
MD040: false

# Allow fenced code blocks without surrounding blank lines (lots of nested
# code blocks inside numbered lists).
MD031: false

# Allow lists without surrounding blank lines (matches our doc style for
# tightly-packed enumerations).
MD032: false

# Allow inline code without surrounding blanks; the heuristic flags too many
# legitimate prose-with-symbols lines.
MD038: false

# Allow trailing punctuation in headings — we use ":" and "." in some.
MD036: false
