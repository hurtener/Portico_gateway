server:
  bind: 127.0.0.1:0  # ephemeral port for tests; production sets a real one
  shutdown_grace: 5s

auth:
  jwt:
    issuer: https://test.local/
    audiences: [portico]
    static_jwks: testdata/jwks-test.json
    tenant_claim: tenant
    scope_claim: scope
    clock_skew: 60s

storage:
  driver: sqlite
  dsn: ":memory:"

tenants:
  - id: acme
    display_name: Acme Corp
    plan: enterprise
    entitlements:
      skills: ["*"]
      max_sessions: 100
  - id: beta
    display_name: Beta Industries
    plan: pro
    entitlements:
      skills: ["github.*"]
      max_sessions: 10

logging:
  level: error
  format: json

skills:
  sources: []

# Code Mode (Phase 13.5) — operator-tunable posture for the executeToolCode
# meta-tool. Omit the whole block for the permissive default (open within a
# tenant). The per-tool-call governance of in-sandbox calls is unaffected.
code_mode:
  disabled: false                  # kill switch: deny every executeToolCode
  max_execution_bytes: 65536       # reject snippets larger than this (0 = no limit)
  max_tool_calls_inside: 20        # ceiling on tool calls per execution (0 = runtime default)
  allowed_binding_levels: []       # restrict to e.g. ["server"]; empty = any
  require_approval_on_execute: false  # gate every run behind the approval flow
  deny_unsafe_starlark: false      # audit static-gate rejections as policy denials
